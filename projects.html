  <style>
    :root{--bg:#fff;--ink:#0a0a0a;--soft:#626262;--faint:#989898;--line:#e9e9e7;--strong:#d7d7d3;--accent:#22c55e;--accent-soft:#e8f9ee;--max:1240px;--shadow:0 24px 70px rgba(10,10,10,.12);--ease:cubic-bezier(.16,1,.3,1)}
    *{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth;overflow-x:clip}body{min-width:320px;overflow-x:clip;background:radial-gradient(circle at 12% 8%,rgba(34,197,94,.1),transparent 30rem),#fff;color:var(--ink);font-family:Inter,system-ui,sans-serif}a{color:inherit;text-decoration:none}button,input,select{font:inherit}:focus-visible{outline:3px solid rgba(34,197,94,.55);outline-offset:3px;border-radius:10px}.wrap{width:min(100% - clamp(32px,5vw,80px),var(--max));margin:auto}.display{font-family:"Bricolage Grotesque",Inter,sans-serif}header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.88);backdrop-filter:blur(18px)}nav{display:flex;align-items:center;justify-content:space-between;gap:18px;min-height:78px;border-bottom:1px solid var(--line)}.brand{display:flex;align-items:center;gap:10px;font-weight:800}.dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 6px rgba(34,197,94,.12)}.navlinks{display:flex;gap:22px;align-items:center}.navlinks a{font-weight:700;font-size:.9rem}.pill{display:inline-flex;align-items:center;justify-content:center;min-height:42px;border-radius:999px;padding:12px 17px;background:var(--ink);color:#fff;font-weight:800}.hero{padding:clamp(58px,9vw,112px) 0 44px}.eyebrow{color:var(--faint);text-transform:uppercase;letter-spacing:.08em;font:800 .75rem "JetBrains Mono"}.hero h1{margin-top:16px;font:800 clamp(3rem,8vw,7rem)/.9 "Bricolage Grotesque";letter-spacing:0;max-width:920px}.hero p{margin-top:20px;max-width:650px;color:var(--soft);font-size:clamp(1rem,.96rem + .25vw,1.18rem);line-height:1.7}.controls{display:grid;grid-template-columns:minmax(0,1fr) 190px;gap:12px;margin:34px 0 24px}.field{min-height:50px;border:1px solid var(--strong);border-radius:999px;padding:0 18px;background:rgba(255,255,255,.78);box-shadow:0 8px 24px rgba(10,10,10,.04)}.filter-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}.filter{border:1px solid var(--line);background:#fff;border-radius:999px;padding:10px 14px;font-weight:800;color:var(--soft);cursor:pointer}.filter.active,.filter:hover{border-color:var(--ink);color:var(--ink);background:var(--accent-soft)}.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:22px}.card{overflow:hidden;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.82);box-shadow:0 8px 26px rgba(10,10,10,.06);transition:transform .28s var(--ease),box-shadow .28s var(--ease),border-color .28s var(--ease)}.card:hover{transform:translateY(-5px);box-shadow:var(--shadow);border-color:rgba(10,10,10,.42)}.thumb{min-height:190px;padding:16px;background:linear-gradient(135deg,#111827,#0f172a 55%,#064e3b);position:relative;overflow:hidden}.thumb:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 78% 18%,rgba(34,197,94,.45),transparent 30%),linear-gradient(120deg,rgba(255,255,255,.12),transparent)}.window{position:relative;height:150px;border:1px solid rgba(255,255,255,.18);border-radius:14px;background:rgba(255,255,255,.08);padding:14px}.dots{display:flex;gap:6px}.dots i{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.65)}.bars{display:grid;gap:10px;margin-top:18px}.bars i{height:10px;border-radius:999px;background:rgba(255,255,255,.18)}.bars i:first-child{width:72%;background:rgba(34,197,94,.7)}.bars i:nth-child(2){width:94%}.bars i:nth-child(3){width:58%}.body{padding:22px}.tag{display:inline-flex;border-radius:999px;background:var(--accent-soft);color:#15803d;padding:6px 10px;font-size:.72rem;font-weight:800}.body h2{margin-top:16px;font:800 1.35rem/1.1 "Bricolage Grotesque"}.body p{margin-top:10px;color:var(--soft);line-height:1.65;font-size:.92rem}.stack{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}.stack span{border:1px solid var(--line);border-radius:8px;padding:5px 8px;color:var(--soft);font:500 .72rem "JetBrains Mono"}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}.link{display:inline-flex;align-items:center;justify-content:center;min-height:38px;border-radius:999px;border:1px solid var(--strong);padding:9px 13px;font-weight:800;font-size:.82rem}.link.primary{background:var(--ink);color:#fff;border-color:var(--ink)}.more{display:flex;justify-content:center;margin:34px 0 74px}.hidden{display:none!important}footer{padding:38px 0 56px;border-top:1px solid var(--line);color:var(--faint);font-size:.86rem}.foot{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}.empty{padding:40px;border:1px dashed var(--strong);border-radius:18px;color:var(--soft);text-align:center;grid-column:1/-1}
    @media(max-width:1024px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:680px){nav{min-height:68px}.navlinks{gap:10px}.navlinks a:not(.pill){display:none}.controls{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.hero h1{font-size:clamp(2.65rem,14vw,4.5rem)}.actions{display:grid}.link{width:100%}}@media(max-width:375px){.wrap{width:min(100% - 28px,var(--max))}.body{padding:20px}}
  </style>
</head>
<body>
  <header><div class="wrap"><nav aria-label="Projects navigation"><a class="brand" href="index.html"><span class="dot"></span>Muhammad Muzammil</a><div class="navlinks"><a href="index.html#work">Home</a><a href="blogs.html">Blog</a><a class="pill" href="index.html#contact">Contact</a></div></nav></div></header>
  <main>
    <section class="hero"><div class="wrap"><div class="eyebrow">All projects</div><h1>Searchable project showcase.</h1><p>Filter Muhammad Muzammil's work by stack and project type. Each card includes context, technologies, GitHub access, and live demo links where available.</p><div class="controls"><input class="field" id="search" type="search" placeholder="Search projects, tech, or descriptions..." aria-label="Search projects"><select class="field" id="sort" aria-label="Sort projects"><option value="featured">Featured first</option><option value="az">A to Z</option></select></div><div class="filter-row" id="filters" aria-label="Project filters"></div></div></section>
    <section class="wrap" aria-live="polite"><div class="grid" id="grid"></div><div class="more"><button class="pill" id="loadMore" type="button">Load More</button></div></section>
  </main>
  <footer><div class="wrap foot"><div>Â© 2026 Muhammad Muzammil</div><div>Full Stack Developer Portfolio</div></div></footer>
  <script>
    const projects=[
      {name:'Hospital Management System',cat:'UI',stack:['React','Tailwind','UI/UX'],desc:'Desktop-oriented admin UI for patients, staff, records, stats, and clinical workflows.',live:'#',github:'https://github.com/MuhammadMuzammil-TheDeveloper',featured:1},
      {name:'Supabase Storage CRUD App',cat:'Full Stack',stack:['Next.js','Supabase','Storage API'],desc:'Storage manager with uploads, previews, file actions, and clean GitHub-inspired UX.',live:'#',github:'https://github.com/MuhammadMuzammil-TheDeveloper',featured:1},
      {name:'WorldAtlas',cat:'Live',stack:['React','REST API','Netlify'],desc:'Country explorer with search, region filters, and REST Countries API detail views.',live:'https://worldatlas-website.netlify.app',github:'https://github.com/MuhammadMuzammil-TheDeveloper',featured:1},
      {name:'AI Quiz Platform',cat:'Live',stack:['JavaScript','CSS','Netlify'],desc:'Quiz app with category selection, timed rounds, score tracking, and result screens.',live:'https://quizapplicationmuzammil.netlify.app',github:'https://github.com/MuhammadMuzammil-TheDeveloper',featured:1},
      {name:'SMIT Website Clone',cat:'Frontend',stack:['HTML','CSS','JavaScript'],desc:'Responsive frontend clone focused on spacing, layout precision, and deployment.',live:'https://smitwebsiteclone.netlify.app',github:'https://github.com/MuhammadMuzammil-TheDeveloper',featured:0},
      {name:'WordPress Blog System',cat:'CMS',stack:['WordPress','Elementor','SEO'],desc:'SEO-ready blog layouts with Elementor, performance tuning, and readable content structure.',live:'#',github:'https://github.com/MuhammadMuzammil-TheDeveloper',featured:0},
      {name:'Firebase Auth Dashboard',cat:'Full Stack',stack:['Firebase','JavaScript','Auth'],desc:'Authentication and dashboard flow with protected screens and persistent user state.',live:'#',github:'https://github.com/MuhammadMuzammil-TheDeveloper',featured:0},
      {name:'Arduino Smart Utility',cat:'Hardware',stack:['Arduino','C++','Sensors'],desc:'Hardware-side experiment connecting sensors and embedded logic with practical UI thinking.',live:'#',github:'https://github.com/MuhammadMuzammil-TheDeveloper',featured:0}
    ];
    const cats=['All',...new Set(projects.map(p=>p.cat))];let active='All',shown=6;
    const filters=document.getElementById('filters'),grid=document.getElementById('grid'),search=document.getElementById('search'),sort=document.getElementById('sort'),more=document.getElementById('loadMore');
    cats.forEach(c=>{const b=document.createElement('button');b.className='filter'+(c==='All'?' active':'');b.textContent=c;b.type='button';b.onclick=()=>{active=c;shown=6;document.querySelectorAll('.filter').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()};filters.appendChild(b)});
    function card(p){return `<article class="card"><div class="thumb"><div class="window"><div class="dots"><i></i><i></i><i></i></div><div class="bars"><i></i><i></i><i></i></div></div></div><div class="body"><span class="tag">${p.cat}</span><h2>${p.name}</h2><p>${p.desc}</p><div class="stack">${p.stack.map(s=>`<span>${s}</span>`).join('')}</div><div class="actions"><a class="link primary" href="${p.live}" ${p.live==='#'?'aria-disabled="true"':'target="_blank" rel="noopener"'}>Live Demo</a><a class="link" href="${p.github}" target="_blank" rel="noopener">GitHub</a></div></div></article>`}
    function render(){let q=search.value.trim().toLowerCase();let list=projects.filter(p=>(active==='All'||p.cat===active)&&[p.name,p.cat,p.desc,...p.stack].join(' ').toLowerCase().includes(q));if(sort.value==='az')list.sort((a,b)=>a.name.localeCompare(b.name));else list.sort((a,b)=>b.featured-a.featured);grid.innerHTML=list.length?list.slice(0,shown).map(card).join(''):'<div class="empty">No projects match this search yet.</div>';more.classList.toggle('hidden',shown>=list.length)}
    search.addEventListener('input',()=>{shown=6;render()});sort.addEventListener('change',render);more.addEventListener('click',()=>{shown+=3;render()});render();
  </script>
</body>
